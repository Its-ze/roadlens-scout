name: Update detection signatures

on:
  workflow_dispatch:
  schedule:
    - cron: "18 10 * * *"

permissions:
  contents: write

jobs:
  update-signatures:
    runs-on: windows-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Refresh signature feed
        shell: pwsh
        run: .\scripts\update-signatures.ps1

      - name: Commit changed feed
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/signatures.json app/public/signatures.json
          if (git diff --cached --quiet) {
            "No signature changes."
            exit 0
          }
          git commit -m "Update RoadLens detection signatures"
          git push

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RoadLens Scout ESP32 Flasher</title>
    <script
      type="module"
      src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module"
    ></script>
    <style>
      :root {
        --bg: #0d1216;
        --panel: #162229;
        --line: #2d3c45;
        --text: #f3f8f5;
        --muted: #a8b8b4;
        --mint: #20c997;
        --mint-2: #7cf8ce;
        --amber: #ffd166;
        color: var(--text);
        background: var(--bg);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 18% -10%, rgba(32, 201, 151, 0.18), transparent 34%),
          linear-gradient(145deg, #111b21 0%, var(--bg) 48%, #101316 100%);
      }

      main {
        width: min(760px, 100%);
        display: grid;
        gap: 18px;
      }

      header {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .mark {
        width: 58px;
        height: 58px;
        border-radius: 12px;
        box-shadow:
          0 0 0 1px rgba(124, 248, 206, 0.18),
          0 14px 34px rgba(0, 0, 0, 0.28);
      }

      .eyebrow {
        display: block;
        color: var(--mint-2);
        font-size: 12px;
        font-weight: 840;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        margin-top: 2px;
        font-size: clamp(32px, 6vw, 58px);
        line-height: 0.98;
      }

      p {
        color: var(--muted);
        line-height: 1.55;
      }

      .panel {
        border: 1px solid rgba(65, 85, 97, 0.68);
        border-radius: 8px;
        background: rgba(17, 24, 32, 0.88);
        padding: 18px;
        display: grid;
        gap: 14px;
        box-shadow: 0 24px 62px rgba(0, 0, 0, 0.25);
      }

      .status {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .status div {
        border: 1px solid rgba(65, 85, 97, 0.64);
        border-radius: 8px;
        padding: 12px;
        background: var(--panel);
      }

      .status strong {
        display: block;
        color: var(--amber);
        font-size: 20px;
      }

      .status span {
        color: var(--muted);
        font-size: 12px;
      }

      esp-web-install-button {
        --esp-tools-button-color: #08120f;
        --esp-tools-button-text-color: #08120f;
      }

      button {
        min-height: 48px;
        border: 0;
        border-radius: 8px;
        background: linear-gradient(135deg, var(--mint-2), var(--mint));
        color: #08120f;
        padding: 0 18px;
        font: inherit;
        font-weight: 860;
      }

      code {
        color: var(--amber);
      }

      @media (max-width: 640px) {
        body {
          padding: 16px;
          place-items: start center;
        }

        header {
          align-items: flex-start;
        }

        .status {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <img class="mark" src="roadlens-mark.svg" alt="" />
        <div>
          <span class="eyebrow">RoadLens Scout</span>
          <h1>ESP32 Flasher</h1>
          <p>Sensor firmware for the RoadLens field map.</p>
        </div>
      </header>

      <section class="panel">
        <div class="status">
          <div>
            <strong>ESP32</strong>
            <span>generic dev board target</span>
          </div>
          <div>
            <strong>BLE</strong>
            <span>RoadLensESP32 link</span>
          </div>
          <div>
            <strong>Wi-Fi</strong>
            <span>passive monitor mode</span>
          </div>
        </div>

        <esp-web-install-button manifest="manifest.json">
          <button slot="activate">Install RoadLens Sensor</button>
        </esp-web-install-button>

        <p>
          Firmware source: <code>firmware.bin</code>. Build refresh:
          <code>.\scripts\build-firmware.ps1</code>.
        </p>
      </section>
    </main>
  </body>
</html>
